store_resolver.select_store:
  path: '/store/select'
  defaults:
    _form: '\Drupal\store_resolver\Form\StoreSelectionForm'
    _title: 'Select Store'
  requirements:
    _permission: 'access content'

store_resolver.ajax_refresh:
  path: '/store/ajax/refresh'
  defaults:
    _controller: '\Drupal\store_resolver\Controller\StoreAjaxController::refreshBlocks'
  requirements:
    _permission: 'access content'
  options:
    no_cache: TRUE
