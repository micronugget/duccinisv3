$schema: https://git.drupalcode.org/project/sdc/-/raw/1.x/src/metadata.schema.json
name: Archive Controls
status: experimental
description: Archive badge, toggle, filter dropdown, and sort dropdown for menu/order items. 1984 LA Olympics design system.
props:
  type: object
  properties:
    badge_label:
      type: string
      title: Badge Label
      description: Text displayed inside the archive badge.
    show_toggle:
      type: boolean
      title: Show Toggle
      description: Whether to render the archive toggle button.
    toggle_label_show:
      type: string
      title: Toggle Label (Show)
      description: Label for the toggle when archived items are hidden.
    toggle_label_hide:
      type: string
      title: Toggle Label (Hide)
      description: Label for the toggle when archived items are visible.
    show_filter:
      type: boolean
      title: Show Filter
      description: Whether to render the category filter dropdown.
    filter_label:
      type: string
      title: Filter Label
      description: Label for the filter dropdown button.
    filter_options:
      type: array
      title: Filter Options
      description: List of filter option objects with value and label keys.
    show_sort:
      type: boolean
      title: Show Sort
      description: Whether to render the sort dropdown.
    sort_label:
      type: string
      title: Sort Label
      description: Label for the sort dropdown button.
    sort_options:
      type: array
      title: Sort Options
      description: List of sort option objects with value and label keys.
