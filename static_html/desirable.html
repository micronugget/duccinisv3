<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Duccinis Menu - Development Prototype</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Oswald" rel="stylesheet">

    <!-- link to Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <!-- Custom CSS (simulating Pizza-Order-Form styles) -->
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #f8f9fa; }
        h1, h2, h3, h4, h5 { font-family: 'Oswald', sans-serif; }

        /* Accordion Styles */
        .card-header { background-color: #fff; padding: 0; }
        .card-header h5 { margin: 0; }
        .card-button {
            color: #333;
            font-weight: bold;
            text-align: left;
            text-decoration: none;
            padding: 1rem;
            width: 100%;
            border: none;
            background: transparent;
        }
        .card-button:hover { text-decoration: none; color: #d9534f; cursor: pointer; }
        .card-button:focus { outline: none; box-shadow: none; }
        .card-body { padding: 1.25rem; }

        /* Views Styles Simulation */
        h3 {
             font-size: 1.2rem;
             margin-top: 1rem;
             margin-bottom: 0.5rem;
             font-weight: bold;
        }
        .views-row {
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .views-row:last-child { border-bottom: none; }
        .views-field-attribute-sandwich-size { font-weight: normal; }
        .views-field-price__number { font-weight: bold; }
    </style>

    <!-- link to jQuery and Bootstrap JS -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="jumbotron text-center">
        <h1>Duccinis Menu</h1>
        <p>Development Prototype</p>
    </div>

    <!-- The Accordion Wrapper -->
    <div id="accordion">

        <!-- Accordion Item 1: Fresh Submarines -->
        <!-- This represents a Group (Product Type) -->
        <div class="card">
            <div class="card-header" id="headingSubs">
                <h5 class="mb-0">
                    <button class="btn btn-block card-button collapsed" data-toggle="collapse" data-target="#collapseSubs" aria-expanded="false" aria-controls="collapseSubs">
                        Fresh Submarines
                    </button>
                </h5>
            </div>

            <div id="collapseSubs" class="collapse" aria-labelledby="headingSubs" data-parent="#accordion">
                <div class="card-body">
                    <!-- BEGIN CONTENT FROM current.html (Cleaned) -->

                    <h3>Italian Cheese Steak</h3>
                    <div class="views-row">
                      <div class="views-field views-field-attribute-sandwich-size"><div class="field-content">Medium 8"</div></div>
                      <div class="views-field views-field-price__number"><span class="field-content">$8.99</span></div>
                    </div>
                    <div class="views-row">
                      <div class="views-field views-field-attribute-sandwich-size"><div class="field-content">X-Large 12"</div></div>
                      <div class="views-field views-field-price__number"><span class="field-content">$12.50</span></div>
                    </div>

                    <h3>Cheese Steak [Rib-Eye]</h3>
                    <div class="views-row">
                      <div class="views-field views-field-attribute-sandwich-size"><div class="field-content">Medium 8"</div></div>
                      <div class="views-field views-field-price__number"><span class="field-content">$8.99</span></div>
                    </div>
                    <div class="views-row">
                      <div class="views-field views-field-attribute-sandwich-size"><div class="field-content">X-Large 12"</div></div>
                      <div class="views-field views-field-price__number"><span class="field-content">$12.50</span></div>
                    </div>

                    <!-- END CONTENT FROM current.html -->
                </div>
            </div>
        </div>

        <!-- Accordion Item 2: Side Orders -->
        <div class="card">
            <div class="card-header" id="headingSides">
                <h5 class="mb-0">
                    <button class="btn btn-block card-button collapsed" data-toggle="collapse" data-target="#collapseSides" aria-expanded="false" aria-controls="collapseSides">
                        Side Orders
                    </button>
                </h5>
            </div>
            <div id="collapseSides" class="collapse" aria-labelledby="headingSides" data-parent="#accordion">
                <div class="card-body">
                    <!-- Mocked Content adhering to the same structure -->

                    <h3>Breadsticks</h3>
                    <div class="views-row">
                      <div class="views-field views-field-attribute-sandwich-size"><div class="field-content">Regular</div></div>
                      <div class="views-field views-field-price__number"><span class="field-content">$5.99</span></div>
                    </div>

                    <h3>Wings</h3>
                    <div class="views-row">
                      <div class="views-field views-field-attribute-sandwich-size"><div class="field-content">6 pieces</div></div>
                      <div class="views-field views-field-price__number"><span class="field-content">$7.99</span></div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Accordion Item 3: Beverages -->
        <div class="card">
            <div class="card-header" id="headingBev">
                <h5 class="mb-0">
                    <button class="btn btn-block card-button collapsed" data-toggle="collapse" data-target="#collapseBev" aria-expanded="false" aria-controls="collapseBev">
                        Beverages
                    </button>
                </h5>
            </div>
            <div id="collapseBev" class="collapse" aria-labelledby="headingBev" data-parent="#accordion">
                <div class="card-body">

                    <h3>Soda</h3>
                    <div class="views-row">
                      <div class="views-field views-field-attribute-sandwich-size"><div class="field-content">Can</div></div>
                      <div class="views-field views-field-price__number"><span class="field-content">$1.99</span></div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
